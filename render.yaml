services:
  # ── Web Service (API + BullMQ Worker) ────────────────────────────────────────
  - type: web
    name: patient-health-risk-api
    runtime: node
    region: oregon
    plan: free
    autoDeploy: true

    # npm ci installs ALL deps (including devDeps needed for tsc + drizzle-kit)
    # npm run build compiles TypeScript → dist/
    # npm run db:push applies the Drizzle schema to the Render PostgreSQL instance
    buildCommand: npm ci && npm run build && npm run db:push
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # PORT is injected automatically by Render — do NOT set it manually

      - key: DATABASE_URL
        fromDatabase:
          name: patient-health-risk-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: patient-health-risk-redis
          property: connectionString

      # Generate with: openssl rand -hex 64
      # Set this manually in the Render dashboard after first deploy
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRY
        value: 15m

      - key: REFRESH_TOKEN_EXPIRY_DAYS
        value: "7"

      - key: KNOWLEDGE_SERVICE_IMPL
        value: mock

      - key: LOG_LEVEL
        value: info

      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"

      - key: RATE_LIMIT_MAX
        value: "100"

      - key: BULLMQ_CONCURRENCY
        value: "3"

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: patient-health-risk-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Render requires databases to be declared at the top level, not inside services
databases:
  - name: patient-health-risk-db
    region: oregon
    plan: free
    databaseName: health_risk_db
    user: postgres
