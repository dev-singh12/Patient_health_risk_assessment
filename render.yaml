services:
  # ── Web Service (API) ────────────────────────────────────────────────────────
  - type: web
    name: patient-health-risk-api
    runtime: node
    region: oregon
    plan: free

    buildCommand: npm ci && npm run build && npm run db:push
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: patient-health-risk-api
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: patient-health-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: patient-health-risk-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false # set manually in Render dashboard
      - key: JWT_EXPIRY
        value: 15m
      - key: REFRESH_TOKEN_EXPIRY_DAYS
        value: "7"
      - key: KNOWLEDGE_SERVICE_IMPL
        value: mock
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: BULLMQ_CONCURRENCY
        value: "3"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - type: pserv
    name: patient-health-risk-db
    runtime: postgres
    region: oregon
    plan: free
    databaseName: health_risk_db
    databaseUser: postgres

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: patient-health-risk-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
